<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StanGuessr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet"
    />
    <!-- <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,700;0,6..12,800;0,6..12,900;1,6..12,400;1,6..12,700;1,6..12,800;1,6..12,900&display=swap" rel="stylesheet" /> -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <button class="login">Login</button>
    </header>

    <main>
      <!-- Landing Page -->
      <div class="hero">
        <h1 class="greeting-message">Let's explore Stanford!</h1>
        <h2 class="instructions">
          Play 5 rounds and gain points to climb the leaderboard
        </h2>
        <button class="play-button">Play Now</button>
      </div>
    </main>

    <footer>
      <button class="leaderboard-bar">Leaderboard ↑</button>
    </footer>

    <!-- Landing Page Leaderboard -->
    <section id="leaderboard">
      <div class="leaderboard-container">
        <div  class="leaderboard-card">
          <h2>Global</h2>
          <ol id="global-stats" class="leaderboard-list">
          </ol>
        </div>
        <div class="leaderboard-card">
          <h2>Personal</h2>
          <div id="signin-msg">Sign in to see stats</div>
          <ol id="personal-stats" class="leaderboard-list">
          </ol>
        </div>
      </div>
    </section>

    <!-- Loading Screen -->
    <div id="loading-screen" class="hidden">
      <div class="loading-content">
        <h1>Loading...</h1>
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Round Tracker (shared between game and results) -->
    <div id="round-tracker" class="hidden">
      <div class="round-item" data-round="1">
        <span class="round-label">R1</span>
        <span class="round-score">-</span>
      </div>
      <div class="round-divider"></div>
      <div class="round-item" data-round="2">
        <span class="round-label">R2</span>
        <span class="round-score">-</span>
      </div>
      <div class="round-divider"></div>
      <div class="round-item" data-round="3">
        <span class="round-label">R3</span>
        <span class="round-score">-</span>
      </div>
      <div class="round-divider"></div>
      <div class="round-item" data-round="4">
        <span class="round-label">R4</span>
        <span class="round-score">-</span>
      </div>
      <div class="round-divider"></div>
      <div class="round-item" data-round="5">
        <span class="round-label">R5</span>
        <span class="round-score">-</span>
      </div>
      <div class="round-divider"></div>
      <div class="round-item total">
        <span class="round-label">Total</span>
        <span class="round-score">0</span>
      </div>
    </div>

    <!-- Game View -->
    <div id="game-view" class="hidden">
      <div id="street-view"></div>
      <div id="guess-map-panel" aria-label="Guess map">
        <div id="guess-map"></div>
        <button id="guess-button" type="button">
          Place your pin on the map
        </button>
      </div>
    </div>

    <!-- In-Round Results View -->
    <div id="results-view" class="hidden">
      <div id="results-map"></div>
      <div class="results-footer">
        <div class="results-distance-section">
          <span class="results-distance-value">0</span>
          <span class="results-distance-label">FROM LOCATION</span>
        </div>
        <button class="results-next-button">NEXT</button>
        <div class="results-score-section">
          <span class="results-score-value">0</span>
          <span class="results-score-label">OF 5,000 POINTS</span>
        </div>
      </div>
    </div>

    <!-- End Summary -->
    <section id="end-screen" class="hidden">
      <div class="end-card">
        <img src="./media/stanford-seal.png" class="seal" alt="Stanford Seal">
        <h1>Round Complete</h1>
        <p id="final-score">Final Score: 0</p>
        <ul id="round-summary"></ul>
        <button id="play-again-btn">Play Again</button>
      </div>
    </section>

    <!-- Accessibility -->
    <div id="announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script src="app.js"></script>
  </body>
</html>
